version: '3.8'

services:
  web:
    build: .
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=grammar_checker
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

volumes:
  mongo_data: